<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - رائد لاب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0D9488; --bg: #F9FAFB; }
        body { font-family: sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .login-card h1 { color: var(--primary); margin-bottom: 1.5rem; font-size: 1.8rem; }
        .input-group { margin-bottom: 1rem; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; outline: none; transition: 0.3s; box-sizing: border-box;}
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover { background: #0F766E; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔬 رائد لاب</h1>
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني للفرع" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit">دخول النظام</button>
        </form>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html'; // التوجه للصفحة الرئيسية بعد النجاح
            } catch (error) {
                alert("خطأ في بيانات الدخول: " + error.message);
            }
        });
    </script>
</body>
</html>
